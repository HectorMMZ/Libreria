<body>

    <div class="BarraDeActividades">
                <h4 style="color: white">Libreria <br> Quimera
                </h4>

                <a href="index.html">Inicio</a>
                <a href="recomendaciones.html">Recomendaciones</a>

    <div class="Contenido">
        <div class="Registro" id="Registro">

            <div class="Formato InicioDeSesion">
                <h2>Iniciar sesion</h2>
                
                <input type="email" placeholder="Correo">
                <input type="password" placeholder="Contraseña">
                
                <button>Ingresar</button>
                
                <p>¿Aun no tienes cuenta?
                    <span id="Registrate">Registrate</span>
                </p>
            </div>

            <div class="Formato NuevaCuenta">
                <h2>Registra</h2>
                
                <input type="text" placeholder="Primer Nombre">
                <input type="text" placeholder="Segundo Nombre">
                <input type="email" placeholder="Correo">
                <input type="password" placeholder="Contraseña">
                <input type="tel" placeholder="Numero Telefonico">
                
                <button>Crear cuenta</button>
                
                <p>¿Todo listo?
                    <span id="RegistroNuevo">Iniciar sesion</span>
                </p>
            </div>

        </div>
    </div>
